<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Penpa Automatic Solver</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      line-height: 1.5;
      color: #222;
    }

    h1 {
      margin-bottom: 0.2em;
    }

    textarea {
      width: 100%;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      resize: vertical;
    }

    button {
      margin-top: 12px;
      margin-right: 8px;
      padding: 9px 16px;
      border: none;
      border-radius: 8px;
      background: #24292f;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      background: #444c56;
    }

    .secondary {
      background: #6e7781;
    }

    .status {
      margin-top: 12px;
      font-weight: 600;
    }

    .error {
      color: #b00020;
    }

    .success {
      color: #0969da;
    }

    .note {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      padding: 12px;
      border-radius: 8px;
      margin: 16px 0;
    }

    label {
      font-weight: 600;
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
    }
  </style>
</head>

<body>
  <h1>Penpa Automatic Solver</h1>

  <p>
    Convert a Penpa answer-check solve link into an editable Penpa solution link.
  </p>

  <div class="note">
    Paste a Penpa answer-check solve link containing both <code>p=</code> and <code>a=</code>.
    Full Penpa links and <code>tinyurl.com</code> links are supported.
  </div>

  <label for="inputUrl">Input Penpa solve link</label>
  <textarea id="inputUrl" rows="8" placeholder="Paste Penpa solve link or TinyURL here..."></textarea>

  <button id="convertOpenButton">Convert and Open</button>
  <button id="convertButton" class="secondary">Convert</button>

  <div id="status" class="status"></div>

  <label for="outputUrl">Output editable solution link</label>
  <textarea id="outputUrl" rows="8" readonly placeholder="The editable solution link will appear here..."></textarea>

  <button id="copyButton" class="secondary">Copy url to Clipboard</button>

  <script src="converter.js"></script>
  <script src="page.js"></script>
</body>
</html>
